<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANDER-TALK | Secure Communication Matrix</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="glow-bg"></div>

    <div class="app-container">
        <!-- Sidebar: Contacts & Search -->
        <aside class="sidebar">
            <header class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar-ring">
                        <img src="https://ui-avatars.com/api/?name=Vander+Dev&background=00FF88&color=000" alt="Profile">
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button id="ghost-mode-btn" title="Toggle Ghost Mode"><i class="fas fa-ghost"></i></button>
                    <button id="settings-btn"><i class="fas fa-cog"></i></button>
                </div>
            </header>

            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search Encrypted Lines...">
            </div>

            <div class="contact-list" id="contact-list">
                <!-- Chats will be injected here -->
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-viewport">
            <!-- Active Chat Header -->
            <header class="chat-header">
                <div class="chat-info">
                    <div class="chat-avatar" id="active-avatar">
                        <img src="https://ui-avatars.com/api/?name=?&background=333&color=fff" alt="User">
                    </div>
                    <div class="chat-details">
                        <h2 id="active-name">Select a Terminal</h2>
                        <span class="status-indicator" id="active-status">Waiting for Handshake...</span>
                    </div>
                </div>
                <div class="chat-actions">
                    <button id="btn-audio-call" class="primary-action"><i class="fas fa-phone"></i></button>
                    <button id="btn-video-call" class="primary-action"><i class="fas fa-video"></i></button>
                    <button class="secondary-action"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </header>

            <!-- Message Container -->
            <div class="message-container" id="message-container">
                <div class="encryption-banner">
                    <i class="fas fa-lock"></i>
                    <span>E2E Sentry Shield Active. All transmission is XOR-encrypted.</span>
                </div>
                <!-- Messages injected here -->
            </div>

            <!-- Input Bar -->
            <footer class="input-area">
                <button class="attach-btn"><i class="fas fa-plus"></i></button>
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Type a message...">
                    <button class="emoji-btn"><i class="far fa-smile"></i></button>
                </div>
                <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </footer>
        </main>
    </div>

    <!-- Call Overlay -->
    <div id="call-overlay" class="overlay hidden">
        <div class="call-card">
            <div class="call-avatar-large">
                <img id="overlay-avatar" src="" alt="Calling">
            </div>
            <h1 id="overlay-name">Vander Dumper</h1>
            <span class="call-status pulse" id="call-status">CONNECTING...</span>
            
            <div class="visualizer">
                <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
            </div>

            <div class="call-controls">
                <button class="btn-mute"><i class="fas fa-microphone-slash"></i></button>
                <button class="btn-end" id="btn-end-call"><i class="fas fa-phone-slash"></i></button>
                <button class="btn-speaker"><i class="fas fa-volume-up"></i></button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
